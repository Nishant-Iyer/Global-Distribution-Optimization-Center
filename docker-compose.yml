version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn gdoc_opt.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: streamlit run gdoc_opt/dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    environment:
      - PYTHONUNBUFFERED=1
