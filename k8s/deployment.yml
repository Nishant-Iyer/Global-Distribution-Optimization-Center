apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdoc-api-deployment
  labels:
    app: gdoc-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gdoc-api
  template:
    metadata:
      labels:
        app: gdoc-api
    spec:
      containers:
      - name: api
        image: gdoc-optimization:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "gdoc_opt.api:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1.0"
            memory: 1Gi
          requests:
            cpu: "500m"
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gdoc-api-service
spec:
  type: ClusterIP
  selector:
    app: gdoc-api
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdoc-dashboard-deployment
  labels:
    app: gdoc-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gdoc-dashboard
  template:
    metadata:
      labels:
        app: gdoc-dashboard
    spec:
      containers:
      - name: dashboard
        image: gdoc-optimization:latest
        imagePullPolicy: IfNotPresent
        command: ["streamlit", "run", "gdoc_opt/dashboard.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
        ports:
        - containerPort: 8501
        resources:
          limits:
            cpu: "1.5"
            memory: 2Gi
          requests:
            cpu: "500m"
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gdoc-dashboard-service
spec:
  type: LoadBalancer
  selector:
    app: gdoc-dashboard
  ports:
  - protocol: TCP
    port: 8501
    targetPort: 8501
